    <!-- 🚨 NEW: Auto/Manual Email Trigger Panel 🚨 -->
    <div style="background: var(--bg-surface); border: 2px solid #6366f1; border-radius: 16px; padding: 1.5rem; margin-bottom: 2rem; box-shadow: 0 4px 15px rgba(99, 102, 241, 0.1);">
        <div style="display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 1rem;">
            <div>
                <h3 style="margin: 0; color: var(--text-primary); font-size: 1.2rem; display: flex; align-items: center; gap: 8px;">
                    <span>🤖</span> Automated Email System Active
                </h3>
                <p style="margin: 0.5rem 0 0 0; color: var(--text-muted); font-size: 0.9rem;">
                    Absence emails are now sent <b>automatically</b> when a period ends. You can still trigger them manually below if needed.
                </p>
            </div>
            
            {% if unfinalized_periods %}
            <form action="{% url 'finalize_period' %}" method="POST" style="display: flex; gap: 10px; align-items: center;" onsubmit="return confirm('Are you sure you want to manually finalize this period?');">
                {% csrf_token %}
                <select name="period_id" required style="padding: 10px 15px; border-radius: 8px; border: 1px solid var(--border-color); background: var(--bg-body); color: var(--text-primary); font-family: inherit; font-size: 0.95rem; cursor: pointer; outline: none;">
                    <option value="" disabled selected>Select Period</option>
                    {% for p in unfinalized_periods %}
                        <option value="{{ p.id }}">{{ p.label }}</option>
                    {% endfor %}
                </select>
                <button type="submit" style="background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: 600; cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);">
                    Manual Override Send 🚀
                </button>
            </form>
            {% else %}
            <div style="padding: 10px 20px; background: rgba(34, 197, 94, 0.1); color: #22c55e; border-radius: 8px; font-weight: 600; display: flex; align-items: center; gap: 8px;">
                <span>✅</span> All ended periods have been finalized for today!
            </div>
            {% endif %}
        </div>
    </div>
