            {% if analytics.total > 0 %}
            <div
                style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem; margin-bottom: 3rem;">
                <div
                    style="background: var(--bg-body); border: 1px solid var(--border-color); border-radius: 12px; padding: 1.5rem; text-align: center;">
                    <div
                        style="font-size: 0.9rem; color: var(--text-secondary); font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.5rem;">
                        Total Days (90d)</div>
                    <div style="font-size: 2.2rem; font-weight: 800; color: var(--text-primary);">{{ analytics.total }}
                    </div>
                </div>
                <div
                    style="background: rgba(34,197,94,0.05); border: 1px solid rgba(34,197,94,0.2); border-radius: 12px; padding: 1.5rem; text-align: center;">
                    <div
                        style="font-size: 0.9rem; color: #16a34a; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.5rem;">
                        Days Present</div>
                    <div style="font-size: 2.2rem; font-weight: 800; color: #15803d;">{{ analytics.present }}</div>
                </div>
                <div
                    style="background: rgba(239,68,68,0.05); border: 1px solid rgba(239,68,68,0.2); border-radius: 12px; padding: 1.5rem; text-align: center;">
                    <div
                        style="font-size: 0.9rem; color: #dc2626; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.5rem;">
                        Days Absent</div>
                    <div style="font-size: 2.2rem; font-weight: 800; color: #b91c1c;">{{ analytics.absent }}</div>
                </div>
                <div
                    style="background: linear-gradient(135deg, rgba(244,63,94,0.1), rgba(244,63,94,0.05)); border: 1px solid rgba(244,63,94,0.2); border-radius: 12px; padding: 1.5rem; text-align: center;">
                    <div
                        style="font-size: 0.9rem; color: #e11d48; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.5rem;">
                        Attendance %</div>
                    <div style="font-size: 2.2rem; font-weight: 800; color: #f43f5e;">{{ analytics.percentage }}%</div>
                </div>
            </div>
            {% endif %}
